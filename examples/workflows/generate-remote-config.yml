# Example: regenerate type-safe Remote Config code on demand.
#
# Copy this into a consumer repository at
# `.github/workflows/generate-remote-config.yml` and adjust the inputs.
#
# This workflow only *generates* the code and surfaces the diff (job summary +
# artifact). Opening a pull request is intentionally left to you — add a step
# such as peter-evans/create-pull-request if you want that.
name: Generate Remote Config

on:
  workflow_dispatch:
    inputs:
      force:
        description: 'Regenerate even when the template is unchanged'
        type: boolean
        default: false

permissions:
  contents: read
  id-token: write # required for Workload Identity Federation

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      # Option A — Workload Identity Federation (keyless, recommended):
      - uses: anies1212/firetools@v0.2.1
        with:
          working-directory: .
          config: firefreeze.yaml
          version: ^0.2.0
          force: ${{ inputs.force }}
          workload-identity-provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service-account: ${{ vars.GCP_SERVICE_ACCOUNT }}

      # Option B — service-account key (instead of the block above):
      #   credentials-json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}

      - name: Upload generated files
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: remote-config
          path: lib/remote_config/

      # Optional: open a PR with the changes (left to you).
      # - uses: peter-evans/create-pull-request@<pin-to-sha>
      #   with:
      #     branch: chore/remote-config
      #     title: 'chore: regenerate Remote Config code'
      #     commit-message: 'chore: regenerate Remote Config code'

# Example: regenerate type-safe Remote Config code on demand and open a PR.
#
# Copy this into a consumer repository at
# `.github/workflows/generate-remote-config.yml` and adjust the inputs.
#
# The firetools action regenerates the code and exposes a `changed` output; this
# workflow uploads the result as an artifact and opens a pull request when there
# are changes. Drop the create-pull-request step if you only want the artifact.
name: Generate Remote Config

on:
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to commit the generated diff to (a PR is opened)'
        type: string
        default: chore/remote-config
      force:
        description: 'Regenerate even when the template is unchanged'
        type: boolean
        default: false

permissions:
  contents: write
  pull-requests: write
  id-token: write # required for Workload Identity Federation

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - id: firefreeze
        uses: anies1212/firetools@v0.2.1
        with:
          working-directory: .
          config: firefreeze.yaml
          version: ^0.2.0
          force: ${{ inputs.force }}
          # Auth — pick one:
          # A) Workload Identity Federation (keyless, recommended):
          workload-identity-provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service-account: ${{ vars.GCP_SERVICE_ACCOUNT }}
          # B) service-account key (instead of the two lines above):
          # credentials-json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}

      - name: Upload generated files
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: remote-config
          path: lib/remote_config/

      - name: Create Pull Request
        if: steps.firefreeze.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@c0f553fe549906ede9cf27b5156039d195d2ece0 # v8.1.0
        with:
          branch: ${{ inputs.branch }}
          title: 'chore: regenerate Remote Config code'
          commit-message: 'chore: regenerate Remote Config code'
          body: Regenerated by firefreeze.
          add-paths: lib/remote_config/
